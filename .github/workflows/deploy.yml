name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Plesk
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare website files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp towel.jpg _site/
          cp ring.jpg _site/
          cp 618508071593312410.jpg _site/
          cp portrait2.jpg _site/
          cp instagram-logo.png _site/
          cp 614604723592888831-1.jpg _site/
          cp 614604818300273307-1.jpg _site/

      - name: Upload to Plesk
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          for file in _site/*; do
            remote_name="${file#_site/}"
            curl \
              --fail \
              --silent \
              --show-error \
              --retry 3 \
              --retry-all-errors \
              --ftp-pasv \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --upload-file "$file" \
              "ftp://$FTP_SERVER/httpdocs/$remote_name"
          done
